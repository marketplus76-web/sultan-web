{{ partial "meta/main.html" . }}
<head>
{{ partial "head.html" . }}
</head>
<body>
	
{{ partial "navbar.html" . }}
<main class="container">

<div class="container mt-5 mb-5"> 
    <div class="row">
        <div class="col-lg-10 mx-auto"> 
            <h2 class="mb-4">Search Results for: "<span id="searchQueryDisplay" class="text-primary">Loading...</span>"</h2>

            <form action="{{ "/search/" | relLangURL }}" method="GET" class="mb-4 input-group">
                <input 
                    type="search" 
                    name="q" 
                    id="searchPageInput" 
                    class="form-control form-control-lg" 
                    placeholder="{{ i18n "searchPlaceholder" | default "Search this site..." }}"
                    value=""
                    aria-label="Search this site"
                >
                <button class="btn btn-primary" type="submit" aria-label="Submit search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                    </svg>
                    {{ i18n "searchButton" | default "Search" }}
                </button>
            </form>

            <div id="searchResults">
            </div>

            <div id="searchMessage" class="mt-3">
            </div>

        </div> 
    </div>
</div>

<script src="https://unpkg.com/lunr/lunr.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    let idx = null; 
    const searchResultsContainer = document.getElementById('searchResults');
    const searchMessageContainer = document.getElementById('searchMessage');
    const searchQueryDisplay = document.getElementById('searchQueryDisplay');
    const searchPageInput = document.getElementById('searchPageInput'); 
    let documents = []; 

    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get('q');

    if (searchQueryDisplay && query) {
      searchQueryDisplay.textContent = query;
    } else if (searchQueryDisplay) {
      searchQueryDisplay.textContent = ""; 
    }

    if (searchPageInput && query) {
        searchPageInput.value = query; 
    }

    if (!query || query.trim() === "") {
      searchMessageContainer.innerHTML = '<div class="alert alert-info">Enter a keyword in the search field.</div>';
      if (searchQueryDisplay) searchQueryDisplay.textContent = "";
      return; 
    }

    searchMessageContainer.innerHTML = '<div class="alert alert-secondary">Loading results...</div>';

    function initializeLunr(data) {
      documents = data; 
      // Uncomment if using Indonesian stemmer and the corresponding JS file is included
      // try {
      //   if (lunr.stemmerSupport && lunr.id) { 
      //     lunr.use(lunr.id);
      //   } else {
      //     console.warn("Lunr.js stemmer for Indonesian (lunr.id) not found or stemmer.support.js not loaded.");
      //   }
      // } catch (e) {
      //   console.error("Error enabling Indonesian stemmer:", e);
      // }
      
      idx = lunr(function () {
        // Uncomment if using multi-language support
        // this.use(lunr.multiLanguage('en', 'id')); 

        this.ref('href'); 
        
        // Fields to be indexed (category and tags removed)
        this.field('title', { boost: 10 }); 
        this.field('content', { boost: 2 }); // Full content from $page.Plain
        this.field('author', { boost: 4 });  // Author
        // this.field('tags', { boost: 5 }); // Removed
        // this.field('category', { boost: 3 });// Removed

        data.forEach(function (doc) {
          this.add(doc);
        }, this);
      });
      performSearch(query); 
    }

    fetch('{{ "/index.json" | relURL }}') 
      .then(response => {
        if (!response.ok) {
            throw new Error('Failed to load index file: ' + response.status + ' ' + response.statusText);
        }
        return response.json();
      })
      .then(data => {
        if (data && Array.isArray(data) && data.length > 0) {
            initializeLunr(data);
        } else if (data && Array.isArray(data) && data.length === 0) {
            searchMessageContainer.innerHTML = '<div class="alert alert-warning">No searchable content. Index file is empty.</div>';
        } else {
            searchMessageContainer.innerHTML = '<div class="alert alert-warning">Index data format is invalid or empty.</div>';
            console.warn("Invalid index data:", data);
        }
      })
      .catch(error => {
        console.error("Error loading or processing search index:", error);
        searchResultsContainer.innerHTML = "";
        searchMessageContainer.innerHTML = '<div class="alert alert-danger" role="alert">Sorry, an error occurred while loading search data. Please try again later.</div>';
      });

    function performSearch(currentQuery) {
      if (!idx) {
        searchMessageContainer.innerHTML = '<div class="alert alert-info">Search index is not ready. Please wait...</div>';
        return;
      }
      if (!currentQuery || currentQuery.trim().length < 1) {
        searchResultsContainer.innerHTML = "";
        searchMessageContainer.innerHTML = '<div class="alert alert-warning">Keyword is too short (minimum 1 character).</div>';
        return;
      }

      searchMessageContainer.innerHTML = ""; 

      try {
        const results = idx.search(currentQuery + '*');
        displayResults(results, currentQuery);
      } catch (e) {
        console.error("Error searching with Lunr.js:", e);
        searchMessageContainer.innerHTML = '<div class="alert alert-danger">An error occurred during the search.</div>';
      }
    }

    function highlight(text, queryText) {
        if (!queryText || queryText.trim() === "" || !text) return text; 
        const terms = queryText.toLowerCase().split(/\s+/).filter(term => term.length > 0);
        let highlightedText = String(text); 
        terms.forEach(term => {
            const escapedTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); 
            try {
                const regex = new RegExp(`(${escapedTerm})`, 'gi'); 
                highlightedText = highlightedText.replace(regex, '<mark>$1</mark>');
            } catch(errRegex) {
                console.warn("Regex error for highlight term:", term, errRegex);
            }
        });
        return highlightedText;
    }

    function displayResults(results, currentQuery) {
      searchResultsContainer.innerHTML = ""; 
      if (results.length === 0) {
        searchResultsContainer.innerHTML = `
          <div class="col-12">
            <p class="mb-0">No results found for "<strong>${highlight(currentQuery, currentQuery)}</strong>".</p>
            <p class="mb-0 text-muted small">Try a different keyword or check the spelling.</p>
          </div>`;
        return;
      }

      results.forEach(function (result) {
        const item = documents.find(doc => doc.href === result.ref);
        if (item) {
          const resultItemDiv = document.createElement('div');
          resultItemDiv.className = "row g-0 border rounded overflow-hidden flex-md-row mb-4 shadow-sm h-md-250 position-relative";
          
          const titleText = item.title ? highlight(item.title, currentQuery) : 'Title Not Available';
          const dateText = item.date || ''; 
          const authorName = item.author ? highlight(item.author, currentQuery) : '';
          
          // Logic for creating a contextual snippet from item.content
          let generatedSnippet = "";
          if (item.content) {
            const plainContent = item.content;
            const queryTerms = currentQuery.toLowerCase().split(/\s+/).filter(term => term.length > 0);
            let firstMatchIndex = -1;
            const snippetLength = 180; // Adjustable snippet length

            for (const term of queryTerms) {
                if (term.length < 1) continue;
                const escapedTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                try {
                    const regex = new RegExp(escapedTerm, 'i');
                    const match = regex.exec(plainContent);
                    if (match) {
                        firstMatchIndex = match.index;
                        break; 
                    }
                } catch(e) { console.warn("Snippet generation: Regex error for term:", term, e); }
            }

            if (firstMatchIndex > -1) {
                const idealStart = firstMatchIndex - Math.floor(snippetLength / 3);
                const start = Math.max(0, idealStart);
                generatedSnippet = plainContent.substring(start, start + snippetLength);
                if (start > 0) generatedSnippet = "..." + generatedSnippet;
                if (start + snippetLength < plainContent.length) generatedSnippet = generatedSnippet + "...";
            } else {
                generatedSnippet = plainContent.substring(0, snippetLength);
                if (plainContent.length > snippetLength) generatedSnippet = generatedSnippet + "...";
            }
          } else if (item.display_summary) { 
            // Fallback if item.content is missing (should always be present with correct index.json)
            generatedSnippet = item.display_summary.substring(0, 180);
            if (item.display_summary.length > 180) generatedSnippet = generatedSnippet + "...";
          }
          const summaryText = highlight(generatedSnippet, currentQuery);
          // End of contextual snippet logic

          let metaInfoHtml = '';
          if (dateText && authorName) {
            metaInfoHtml = `<div class="mb-1 text-body-secondary">${dateText} · ${authorName}</div>`;
          } else if (dateText) {
            metaInfoHtml = `<div class="mb-1 text-body-secondary">${dateText}</div>`;
          } else if (authorName) {
            metaInfoHtml = `<div class="mb-1 text-body-secondary">${authorName}</div>`;
          } else {
            metaInfoHtml = `<div class="mb-1 text-body-secondary" style="min-height: 1.2em;"></div>`; // Maintain spacing if both are empty
          }

          resultItemDiv.innerHTML = `
            <div class="col p-4 d-flex flex-column position-static">
              {{/* Category row removed from here */}}
              <h3 class="mb-0"><a class="post-link" href="${item.href || '#'}">${titleText}</a></h3>
              ${metaInfoHtml}
              <p class="card-text mb-auto">
                ${summaryText}
              </p>
            </div>
            `;
          searchResultsContainer.appendChild(resultItemDiv);
        }
      });
    }
  });
</script>

</main>
{{ partial "footer.html" . }}
</body>
</html>
