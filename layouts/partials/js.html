<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>

<script>
    // Menunggu seluruh halaman HTML selesai dimuat sebelum menjalankan JavaScript.
    document.addEventListener('DOMContentLoaded', function() {

        // 1. Inisialisasi semua ikon Lucide di halaman.
        lucide.createIcons();

        // 2. Konfigurasi dan inisialisasi Swiper JS untuk slider di halaman utama.
        var swiper = new Swiper(".mySwiper", {
            spaceBetween: 0,
            centeredSlides: true,
            loop: true,
            effect: "fade",
            autoplay: {
                delay: 5000,
                disableOnInteraction: false
            },
            pagination: {
                el: ".swiper-pagination",
                clickable: true
            },
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev"
            },
        });

        // 3. Logika untuk fungsionalitas menu mobile (hamburger menu).
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');
        const mobileMenuLinks = document.querySelectorAll('.mobile-menu-link');

        if (menuBtn) {
            menuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
                if (mobileMenu.classList.contains('hidden')) {
                    menuIcon.setAttribute('data-lucide', 'menu');
                } else {
                    menuIcon.setAttribute('data-lucide', 'x');
                }
                lucide.createIcons();
            });
        }

        mobileMenuLinks.forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.add('hidden');
                menuIcon.setAttribute('data-lucide', 'menu');
                lucide.createIcons();
            });
        });

        // =======================================================
        // == KODE BARU UNTUK EFEK KLIK DI MOBILE ADA DI SINI ==
        // =======================================================
        const productCards = document.querySelectorAll('.product-card');

        productCards.forEach(card => {
            // Saat jari mulai menyentuh kartu
            card.addEventListener('touchstart', function() {
                card.classList.add('card-active');
            }, {passive: true}); // {passive: true} untuk performa scrolling yang lebih baik

            // Saat jari diangkat dari kartu
            card.addEventListener('touchend', function() {
                card.classList.remove('card-active');
            });

            // Jika sentuhan dibatalkan (misal: ada notifikasi masuk)
            card.addEventListener('touchcancel', function() {
                card.classList.remove('card-active');
            });
        });

    }); // Penutup untuk event listener DOMContentLoaded
</script>
